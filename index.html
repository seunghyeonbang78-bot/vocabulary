// =======================
// localStorage 안전 로딩
// =======================
let words = [];

const saved = localStorage.getItem("words");

if (saved) {
    try {
        const parsed = JSON.parse(saved);
        if (Array.isArray(parsed)) {
            words = parsed;
        } else {
            words = [...defaultWords];
        }
    } catch (e) {
        words = [...defaultWords];
    }
} else {
    words = [...defaultWords];
    localStorage.setItem("words", JSON.stringify(words));
}

// =======================
// 저장
// =======================
function save(){
    localStorage.setItem("words", JSON.stringify(words));
}

// =======================
// 화면 그리기
// =======================
function draw(){
    const list = document.getElementById("wordList");
    list.innerHTML = "";

    words.forEach((word)=>{
        const div = document.createElement("div");
        div.className = "word";

        div.innerHTML = `
            <div class="english">${word.english}</div>
            <div class="korean">${word.korean}</div>
        `;

        div.onclick = () => {
            const k = div.querySelector(".korean");
            k.style.display = (k.style.display === "block") ? "none" : "block";
        };

        list.appendChild(div);
    });
}

// =======================
// 단어 추가
// =======================
function addWord(){
    const e = document.getElementById("english").value.trim();
    const k = document.getElementById("korean").value.trim();

    if(!e || !k){
        alert("영어랑 뜻 둘 다 입력해야 됨");
        return;
    }

    words.push({english:e, korean:k});
    save();
    draw();

    document.getElementById("english").value = "";
    document.getElementById("korean").value = "";
}

// =======================
// 전체 삭제
// =======================
function deleteAll(){
    if(confirm("진짜 다 삭제할거야?")){
        words = [];
        save();
        draw();
    }
}

// 처음 실행
draw();

</script>
